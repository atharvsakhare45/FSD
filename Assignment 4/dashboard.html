<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
    }

    .container {
        width: 90%;
        max-width: 900px;
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        text-align: center;
        animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        margin-bottom: 20px;
        font-size: 32px;
        letter-spacing: 1px;
    }

    .search-container {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 25px;
    }

    input {
        padding: 12px 15px;
        border-radius: 30px;
        border: none;
        outline: none;
        width: 250px;
        font-size: 16px;
        transition: 0.3s;
    }

    input:focus {
        box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    button {
        padding: 12px 20px;
        border-radius: 30px;
        border: none;
        background: linear-gradient(135deg, #ff7eb3, #ff758c);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .weather-info {
        margin-bottom: 20px;
    }

    .weather-info h2 {
        font-size: 26px;
        margin-bottom: 5px;
    }

    .weather-info p {
        font-size: 18px;
        opacity: 0.9;
    }

    .chart-container {
        background: rgba(255,255,255,0.15);
        padding: 20px;
        border-radius: 15px;
    }
</style>

</head>

<body>

<div class="container">
    <h1>🌤 Weather Dashboard</h1>

    <div class="search-container">
        <input type="text" id="cityInput" placeholder="Enter city (e.g., Mumbai)">
        <button onclick="getWeatherData()">Search</button>
    </div>

    <div class="weather-info">
        <h2 id="cityNameDisplay">Search a city</h2>
        <p id="weatherDescription">Live weather updates will appear here</p>
    </div>

    <div class="chart-container">
        <canvas id="weatherChart"></canvas>
    </div>
</div>

<script src="js1.js"></script>

</body>
</html>
