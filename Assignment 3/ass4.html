<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: center; border-left: 5px solid #007bff; }
        .card h4 { margin: 0; color: #666; font-size: 0.9rem; }
        .card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: #333; }

        .chart-box { height: 350px; position: relative; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name (e.g., London, Mumbai)">
        <button onclick="fetchWeather()">Get Weather</button>
    </div>

    <div class="stats">
        <div class="card">
            <h4>City</h4>
            <p id="city-name">--</p>
        </div>
        <div class="card" style="border-left-color: #ff9f43;">
            <h4>Temperature</h4>
            <p id="curr-temp">--°C</p>
        </div>
        <div class="card" style="border-left-color: #48dbfb;">
            <h4>Humidity</h4>
            <p id="curr-humidity">--%</p>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="forecastChart"></canvas>
    </div>
</div>

<script>
    const API_KEY = 'bef1150356e8f2c281a9267aaa113a25'; // INSERT YOUR KEY HERE
    let weatherChart;

    async function fetchWeather() {
        const city = document.getElementById('cityInput').value;
        if (!city) return alert("Please enter a city!");

        try {
            // 1. Fetch data from OpenWeatherMap (5-day forecast, 3-hour steps)
            const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`);
            
            if (!response.ok) throw new Error("City not found");
            const data = await response.json();

            updateUI(data);
            updateChart(data);
        } catch (error) {
            alert(error.message);
        }
    }

    function updateUI(data) {
        document.getElementById('city-name').innerText = data.city.name;
        document.getElementById('curr-temp').innerText = Math.round(data.list[0].main.temp) + "°C";
        document.getElementById('curr-humidity').innerText = data.list[0].main.humidity + "%";
    }

    function updateChart(data) {
        // We extract the next 8 readings (which equals 24 hours of data)
        const next24h = data.list.slice(0, 8);
        
        const labels = next24h.map(item => {
            const date = new Date(item.dt * 1000);
            return date.getHours() + ":00";
        });
        
        const temps = next24h.map(item => item.main.temp);
        const humidities = next24h.map(item => item.main.humidity);

        // If chart exists, destroy it before creating a new one (prevents glitching)
        if (weatherChart) weatherChart.destroy();

        const ctx = document.getElementById('forecastChart').getContext('2d');
        weatherChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Temp (°C)',
                        data: temps,
                        borderColor: '#ff9f43',
                        backgroundColor: 'rgba(255, 159, 67, 0.2)',
                        fill: true,
                        tension: 0.3
                    },
                    {
                        label: 'Humidity (%)',
                        data: humidities,
                        borderColor: '#48dbfb',
                        backgroundColor: 'transparent',
                        borderDash: [5, 5],
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }

    // Initial load for a default city
    window.onload = () => {
        document.getElementById('cityInput').value = "London";
        fetchWeather();
    };
</script>

</body>
</html>
